name: Build, scan and publish Docker image

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  APP_NAME: pawcho-zadanie-2
  DOCKERHUB_CACHE_REPO: kanterete/zadanie-2-cache

jobs:
  scan:
    name: Build and scan ${{ matrix.platform }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            platform_tag: amd64
          - platform: linux/arm64
            platform_tag: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for CVE scan
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: local/${{ env.APP_NAME }}:${{ matrix.platform_tag }}-scan
          cache-from: type=registry,ref=${{ env.DOCKERHUB_CACHE_REPO }}:${{ matrix.platform_tag }}
          cache-to: type=registry,ref=${{ env.DOCKERHUB_CACHE_REPO }}:${{ matrix.platform_tag }},mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: local/${{ env.APP_NAME }}:${{ matrix.platform_tag }}-scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          vuln-type: os,library

  publish:
    name: Publish multi-arch image to GHCR
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${APP_NAME}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: |
            type=registry,ref=${{ env.DOCKERHUB_CACHE_REPO }}:amd64
            type=registry,ref=${{ env.DOCKERHUB_CACHE_REPO }}:arm64
          cache-to: type=registry,ref=${{ env.DOCKERHUB_CACHE_REPO }}:buildcache,mode=max
